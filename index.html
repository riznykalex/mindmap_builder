<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;600&family=Syne:wght@400;600;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --text: #e8e8f0;
    --text-muted: #7070a0;
    --accent: #7c6af7;
    --accent2: #f76a8c;
  }
  body.light {
    --bg: #f0f0f5;
    --surface: #ffffff;
    --surface2: #e8e8f0;
    --border: #d0d0de;
    --text: #1a1a2e;
    --text-muted: #7070a0;
    --accent: #6c5ce7;
    --accent2: #e84393;
  }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── TOOLBAR ── */
  #toolbar {
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0 12px;
    flex-shrink: 0;
    z-index: 100;
  }
  .logo-wrap { display: flex; flex-direction: column; align-items: flex-start; margin-right: 6px; line-height: 1.2; flex-shrink: 0; }
  .logo { font-weight: 800; font-size: 13px; letter-spacing:.04em; color: var(--accent); }
  #project-name-tb { font-size: 12px; color: #ffffff; font-family: 'Syne', sans-serif; font-weight: 600; white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  #project-name-tb:hover { color: var(--accent); }
  body.light #project-name-tb { color: var(--text); }
  .sep { width: 1px; height: 26px; background: var(--border); margin: 0 3px; }
  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 5px 11px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--border); border-color: var(--accent); }
  .btn.danger:hover { border-color: var(--accent2); color: var(--accent2); }
  #hint { margin-left: auto; font-size: 10px; color: var(--text-muted); font-family: 'Martian Mono', monospace; }

  .tb-pick-wrap { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); font-family: 'Martian Mono', monospace; }
  .tb-pick { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background: none; padding: 2px; }

  /* ── CANVAS ── */
  #canvas-wrap {
    flex: 1; position: relative; overflow: hidden; cursor: default;
    background: var(--bg);
  }
  #canvas-wrap.panning { cursor: grabbing; }

  /* edges SVG — z-index 1 = below world (nodes) */
  svg#edges {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
    z-index: 1;
  }

  /* world = nodes layer on top of edges */
  #world { position: absolute; top: 0; left: 0; transform-origin: 0 0; z-index: 2; }

  /* ── NODE ── */
  .node {
    position: absolute;
    border-radius: 10px;
    padding: 9px 14px;
    cursor: grab;
    border: 2px solid transparent;
    transition: border-color .15s, box-shadow .15s;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  }
  .node:active { cursor: grabbing; }
  .node.sel { border-color: #fff !important; box-shadow: 0 0 0 3px rgba(255,255,255,.15); }

  /* node image */
  .node-img {
    display: block;
    float: none;
    margin: 0;
    border-radius: 6px;
    object-fit: contain;
    max-height: 80px;
    max-width: 80px;
	  flex-shrink: 0;
    cursor: zoom-in;
  }
  .node-img-clearfix::after {
    content: ''; display: table; clear: both;
  }
  
  .node-img-clearfix {
  display: none;
}
  
  .node-img-del {
    position: absolute; top: 4px; right: 4px;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(0,0,0,.55); color: #fff;
    font-size: 11px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    z-index: 15; line-height: 1;
  }
  .node:hover .node-img-del { display: flex; }

.node-text {
  flex: 1;
  white-space: pre-wrap;
}


  /* image panel in palette */
  #pal-image-section {
    flex-direction: column; gap: 7px; padding-top: 7px;
  }
  .img-row { display: flex; gap: 6px; align-items: center; }
  .img-row input[type=text] {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 5px 8px;
    font-family: 'Martian Mono', monospace; font-size: 11px;
  }
  .img-upload-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 5px 10px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: 'Syne', sans-serif; white-space: nowrap;
    display: flex; align-items: center; gap: 4px;
  }
  .img-upload-btn:hover { background: var(--border); }
  .img-upload-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .img-upload-btn.primary:hover { filter: brightness(1.15); }
  #img-upload-progress { font-size: 10px; color: var(--text-muted); font-family: 'Martian Mono', monospace; display: none; }

  /* lightbox */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,.82);
    align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: 90vw; max-height: 90vh;
    border-radius: 10px;
    box-shadow: 0 8px 48px rgba(0,0,0,.6);
    object-fit: contain;
  }
  #lightbox-close {
    position: fixed; top: 18px; right: 22px;
    color: #fff; font-size: 28px; cursor: pointer;
    line-height: 1; opacity: .7;
  }
  #lightbox-close:hover { opacity: 1; }

  .node-text {
    font-size: 12px; font-weight: 600; line-height: 1.4;
    word-break: break-word; outline: none;
    background: transparent; border: none;
    font-family: 'Syne', sans-serif;
    resize: none; overflow: hidden; min-height: 18px;
    cursor: text; display: block;
    white-space: pre;
  }

  /* connect dot */
  .node-dot {
    position: absolute; right: -7px; top: 50%;
    transform: translateY(-50%);
    width: 12px; height: 12px; border-radius: 50%;
    cursor: crosshair; opacity: 0;
    transition: opacity .15s; z-index: 10;
    border: 2px solid rgba(0,0,0,.35);
  }
  .node:hover .node-dot { opacity: 1; }

  /* +/− buttons */
  .node-actions {
    position: absolute; right: -48px; top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 3px;
    opacity: 0; transition: opacity .15s; z-index: 20;
  }
  .node:hover .node-actions { opacity: 1; }
  .node-btn {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-muted); font-size: 15px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .12s, color .12s; line-height: 1;
  }
  .node-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .node-btn.minus:hover { background: var(--accent2); border-color: var(--accent2); }

  /* ── PALETTE PANEL ── */
  #palette-panel {
    position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 16px; z-index: 300;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
    opacity: 0; pointer-events: none; transition: opacity .2s;
    min-width: 360px; max-width: 520px;
  }
  #palette-panel.show { opacity: 1; pointer-events: all; }

  .pal-title { font-size: 10px; color: var(--text-muted); font-family: 'Martian Mono', monospace; margin-bottom: 8px; }
  #swatches { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }

  .swatch {
    width: 24px; height: 24px; border-radius: 6px; cursor: pointer;
    border: 2px solid transparent; transition: transform .12s; flex-shrink: 0; position: relative;
  }
  .swatch:hover { transform: scale(1.18); }
  .swatch.active { border-color: #fff; }
  .swatch-x {
    display: none; position: absolute; top: -5px; right: -5px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent2); color: #fff;
    font-size: 9px; align-items: center; justify-content: center; cursor: pointer;
  }
  .swatch:hover .swatch-x { display: flex; }

  /* Two rows: bg-color + text-color pickers, then new-color input */
  .pal-section { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .pal-section-label { font-size: 10px; color: var(--text-muted); font-family: 'Martian Mono', monospace; white-space: pre; }
  .mini-pick { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background: none; padding: 2px; }

  .new-color-row {
    display: flex; align-items: center; gap: 7px;
    border-top: 1px solid var(--border); padding-top: 9px;
  }
  #new-color-picker { width: 32px; height: 32px; border-radius: 7px; border: 1px solid var(--border); cursor: pointer; background: none; padding: 2px; flex-shrink: 0; }
  #new-color-hex { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 8px; font-family: 'Martian Mono', monospace; font-size: 12px; width: 90px; }
  .pal-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Syne', sans-serif; white-space: nowrap; }
  .pal-btn:hover { background: var(--border); }
  .pal-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pal-btn.primary:hover { filter: brightness(1.15); }

  .align-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); border-radius: 5px; width: 26px; height: 26px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background .12s; }
  .align-btn:hover { background: var(--border); color: var(--text); }
  .align-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  #btn-theme { background: none; border: 1px solid var(--border); border-radius: 7px; width: 32px; height: 32px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background .15s; flex-shrink: 0; }
  #btn-theme:hover { background: var(--surface2); }

  #lang-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 4px 6px; font-family: 'Syne', sans-serif; font-size: 12px; cursor: pointer; flex-shrink: 0; }

  /* ── ZOOM ── */
  #zoom-info { position: fixed; bottom: 16px; right: 16px; font-family: 'Martian Mono', monospace; font-size: 11px; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; z-index: 200; }
  #autosave-ind { position: fixed; bottom: 16px; right: 80px; font-family: 'Martian Mono', monospace; font-size: 11px; color: #4ec9b0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; z-index: 200; opacity: 0; transition: opacity .4s; }

  /* ── CTX MENU ── */
  #ctx-menu { position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 5px; z-index: 500; display: none; min-width: 155px; box-shadow: 0 8px 24px rgba(0,0,0,.5); }
  #ctx-menu .mi { padding: 7px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  #ctx-menu .mi:hover { background: var(--surface2); }
  #ctx-menu .mi.danger { color: var(--accent2); }
</style>
</head>
<body>

<div id="toolbar">
  <div class="logo-wrap">
    <span class="logo">◈ MindMap</span>
    <span id="project-name-tb" title="Клік — змінити назву проекту" data-i18n-placeholder="noProject">(без назви)</span>
  </div>
  <div class="sep"></div>
  <button class="btn" id="btn-add">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.4"/><path d="M6 3.5v5M3.5 6h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    <span id="lbl-btn-add">Вузол</span>
  </button>
  <button class="btn" id="btn-del">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 3h8M5 3V2h2v1M4.5 5.5v3M7.5 5.5v3M2.5 3l.6 6.5h5.8L9.5 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span id="lbl-btn-del">Видалити</span>
  </button>
  <div class="sep"></div>
  <div class="tb-pick-wrap">
    <span>Фон:</span>
    <input type="color" class="tb-pick" id="bg-color-input" value="#0f0f13" title="Колір фону">
  </div>
  <div class="sep"></div>
  <button class="btn" id="btn-save">💾 Зберегти</button>
  <button class="btn" id="btn-load">📂 Завантажити</button>
  <button class="btn" id="btn-export">⬇ PNG</button>
  <button class="btn" id="btn-export-txt">⬇ TXT</button>
  <button class="btn danger" id="btn-clear">🗑 Очистити</button>
  <div class="sep"></div>
  <button id="btn-theme" title="Змінити тему">🌙</button>
  <div class="sep"></div>
  <select id="lang-select" title="Мова інтерфейсу">
    <option value="uk">🇺🇦 UA</option>
    <option value="en">🇬🇧 EN</option>
    <option value="fr">🇫🇷 FR</option>
    <option value="es">🇪🇸 ES</option>
    <option value="de">🇩🇪 DE</option>
    <option value="zh">🇨🇳 ZH</option>
    <option value="ja">🇯🇵 JA</option>
  </select>
  <span id="hint">2×клік = вузол · ● = з'єднати · Scroll = zoom · Пробіл+drag = pan · Del = видалити</span>
  <input type="file" id="file-input" accept=".json" style="display:none">
</div>

<div id="canvas-wrap">
  <svg id="edges"></svg>
  <div id="world"></div>
  <svg id="tmp-svg" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:60">
    <line id="tmp-line" x1="0" y1="0" x2="0" y2="0"
      stroke="#f76a8c" stroke-width="2" stroke-dasharray="6 3" stroke-linecap="round" style="display:none"/>
  </svg>
</div>

<!-- PALETTE -->
<div id="palette-panel">
  <div class="pal-title" id="lbl-pal-title">Кольори вузла</div>
  <div id="swatches"></div>

  <!-- Node color + text color quick pickers -->
  <div class="pal-section">
    <span class="pal-section-label" id="lbl-pal-node">Вузол:</span>
    <input type="color" class="mini-pick" id="quick-node-color" value="#7c6af7" title="Колір вузла">
    <span class="pal-section-label" id="lbl-pal-text" style="margin-left:8px">Текст:</span>
    <input type="color" class="mini-pick" id="quick-text-color" value="#ffffff" title="Колір тексту">
    <button class="pal-btn" id="btn-add-swatch" style="margin-left:8px">+ До палітри</button>
  </div>

  <!-- Font size + alignment -->
  <div class="pal-section" style="border-top:1px solid var(--border);padding-top:8px;margin-top:2px;gap:6px">
    <span class="pal-section-label" id="lbl-pal-font">Шрифт:</span>
    <select id="pal-font-size" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:3px 6px;font-family:'Syne',sans-serif;font-size:12px;cursor:pointer">
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12" selected>12</option>
      <option value="13">13</option>
      <option value="14">14</option>
      <option value="16">16</option>
      <option value="18">18</option>
      <option value="20">20</option>
      <option value="24">24</option>
    </select>
    <span class="pal-section-label" id="lbl-pal-align" style="margin-left:6px">Вирівн.:</span>
    <div id="pal-align" style="display:flex;gap:3px">
      <button class="align-btn active" data-align="left" title="Ліво">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="1" y1="3" x2="13" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="1" y1="7" x2="9" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="1" y1="11" x2="11" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="align-btn" data-align="center" title="По центру">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="1" y1="3" x2="13" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="3" y1="7" x2="11" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="2" y1="11" x2="12" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="align-btn" data-align="right" title="Право">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="1" y1="3" x2="13" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="5" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="3" y1="11" x2="13" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- Image section — collapsed by default -->
  <div style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px;display:flex;align-items:center;gap:6px">
    <button class="img-upload-btn" id="btn-img-toggle" title="Зображення" style="padding:5px 8px">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/><circle cx="4.5" cy="5.5" r="1" fill="currentColor"/><path d="M1 9.5l3-3 2.5 2.5 2-2 3.5 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="lbl-pal-image">Зображення</span>
    </button>
    <span id="img-upload-progress" style="font-size:10px;color:var(--text-muted);font-family:'Martian Mono',monospace;display:none">⏳</span>
  </div>

  <div id="pal-image-section" style="display:none;flex-direction:column;gap:7px;padding-top:7px">
    <div class="img-row">
      <button class="img-upload-btn" id="btn-img-file">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 8.5V2M4 4.5L6.5 2 9 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 9.5v1a1 1 0 001 1h7a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span id="lbl-img-file">Завантажити файл</span>
      </button>
      <button class="img-upload-btn" id="btn-img-clipboard">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1.5" y="3.5" width="8" height="9" rx="1" stroke="currentColor" stroke-width="1.3"/><path d="M4 3.5V2.5a1 1 0 011-1h5a1 1 0 011 1v7a1 1 0 01-1 1H10" stroke="currentColor" stroke-width="1.3"/></svg>
        <span id="lbl-img-clipboard">З буферу</span>
      </button>
    </div>
    <div class="img-row">
      <input type="text" id="img-url-input" placeholder="https://…">
      <button class="img-upload-btn primary" id="btn-img-url">
        <span id="lbl-img-url">Додати URL</span>
      </button>
    </div>
  </div>
  <input type="file" id="img-file-input" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none">
</div>

<!-- CTX MENU -->
<!-- ctx-menu removed -->

<div id="autosave-ind">✓ автозбережено</div>
<div id="zoom-info">100%</div>

<!-- Lightbox -->
<div id="lightbox">
  <span id="lightbox-close">×</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ─── I18N ─────────────────────────────────────────────
const I18N = {
  uk: {
    btnAdd: 'Вузол', btnDel: 'Видалити', btnSave: '💾 Зберегти',
    btnLoad: '📂 Завантажити', btnExportPng: '⬇ PNG', btnExportTxt: '⬇ TXT',
    btnClear: '🗑 Очистити',
    bgLabel: 'Фон:',

// ─── HELPERS ──────────────────────────────────────────
function rgb(hex){
  return { r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16) };
}
function hexOk(h){ return /^#[0-9a-fA-F]{6}$/.test(h); }
function isText(){ const t=document.activeElement?.tagName; return t==='TEXTAREA'||t==='INPUT'; }

// Lighten a hex color by pct (0–1)
function lighten(hex, pct){
  let {r,g,b}=rgb(hex);
  r=Math.min(255, Math.round(r+(255-r)*pct));
  g=Math.min(255, Math.round(g+(255-g)*pct));
  b=Math.min(255, Math.round(b+(255-b)*pct));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function getParentId(id){
  const edge = S.edges.find(e => e.to === id);
  return edge ? edge.from : null;
}


// ─── DUPLICATE SUBTREE ─────────────────────────

function duplicateSubtree(id, parentId = null, offset = null){
  const n = S.nodes[id];
  if(!n) return null;

  if(!offset){
    offset = {
      x: 60 + Math.random()*20,
      y: 40 + Math.random()*20
    };
  }

  const newId = mkNode(
    n.x + offset.x,
    n.y + offset.y,
    n.text,
    n.color,
    parentId,
    n.textColor,
    n.fontSize,
    n.textAlign,
    n.imageUrl,
    true  // silent — не фокусуємо, не перериваємо рекурсію
  );

  const children = S.edges
    .filter(e => e.from === id)
    .map(e => e.to);

  children.forEach(childId => {
    duplicateSubtree(childId, newId, offset);
  });

  return newId;
}

// ─── MAIN DUPLICATE ACTION ─────────────────────────

function duplicateNode(id){
  const parentId = getParentId(id);
  const newId = duplicateSubtree(id, parentId);
  if(!newId) return;
  // два rAF: перший — браузер малює DOM, другий — розміри вже відомі
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      Object.values(S.nodes).forEach(n=>{
        const el=document.getElementById(n.id);
        if(el){ n.w=el.offsetWidth; n.h=el.offsetHeight; }
      });
      drawEdges();
      pickNode(newId);
    });
  });
}


// ─── TRANSFORM ────────────────────────────────────────
function applyTr(){
  world.style.transform=`translate(${S.tr.x}px,${S.tr.y}px) scale(${S.tr.s})`;
  drawEdges();
  zInfo.textContent=Math.round(S.tr.s*100)+'%';
}
function w2s(wx,wy){
  const r=canvas.getBoundingClientRect();
  return { x:wx*S.tr.s+S.tr.x+r.left, y:wy*S.tr.s+S.tr.y+r.top };
}
function s2w(cx,cy){
  const r=canvas.getBoundingClientRect();
  return { x:(cx-r.left-S.tr.x)/S.tr.s, y:(cy-r.top-S.tr.y)/S.tr.s };
}

// ─── PAN / ZOOM ───────────────────────────────────────
let panning=false, panSt=null, space=false;
window.addEventListener('keydown', e=>{
  if(e.code==='Space'&&!isText()){space=true;e.preventDefault();}
  if(e.key==='Delete'&&!isText()) delSel();
});
window.addEventListener('keyup', e=>{ if(e.code==='Space'){space=false;canvas.classList.remove('panning');} });
canvas.addEventListener('mousedown', e=>{
  if(e.button===1||space){ panning=true; panSt={x:e.clientX-S.tr.x,y:e.clientY-S.tr.y}; canvas.classList.add('panning'); e.preventDefault(); }
});
window.addEventListener('mousemove', e=>{ if(!panning)return; S.tr.x=e.clientX-panSt.x; S.tr.y=e.clientY-panSt.y; applyTr(); });
window.addEventListener('mouseup', ()=>{ panning=false; canvas.classList.remove('panning'); });
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.9;
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  S.tr.x=mx-(mx-S.tr.x)*f; S.tr.y=my-(my-S.tr.y)*f;
  S.tr.s=Math.max(0.1,Math.min(5,S.tr.s*f));
  applyTr();
},{passive:false});

// ─── NODE ─────────────────────────────────────────────
function mkNode(wx,wy,text=null,color='#7c6af7',parentId=null,textColor='#ffffff',fontSize=12,textAlign='center',imageUrl=null,silent=false){
  if(text===null) text=t('defaultNode');
  const id='n'+(++nid);
  const n={id,x:wx,y:wy,text,color,textColor,fontSize,textAlign,imageUrl,w:110,h:38};
  S.nodes[id]=n;
  buildEl(n);
  if(parentId) mkEdge(parentId,id);
  if(!silent) pickNode(id);
  requestAnimationFrame(()=>{
    const el=document.getElementById(id);
    n.w=el.offsetWidth; n.h=el.offsetHeight;
    drawEdges();
    if(!silent){
      const ta=el.querySelector('.node-text');
      ta.focus(); ta.select();
    }
  });
  return id;
}

function buildEl(n){
  const el=document.createElement('div');
  el.className='node'; el.id=n.id;
  styleNode(el,n);

  const ta=document.createElement('textarea');
  ta.className='node-text'; ta.value=n.text; ta.rows=1; ta.spellcheck=false;
  ta.style.color=n.textColor||'#ffffff';
  ta.style.fontSize=(n.fontSize||12)+'px';
  ta.style.textAlign=n.textAlign||'center';
  ta.addEventListener('input',()=>{ n.text=ta.value; grow(ta); n.w=el.offsetWidth; n.h=el.offsetHeight; drawEdges(); });
  ta.addEventListener('mousedown',e=>e.stopPropagation());
  ta.addEventListener('focus',()=>pickNode(n.id));

  const dot=document.createElement('div');
  dot.className='node-dot'; dot.style.background=n.color;
  dot.addEventListener('mousedown',e=>{ e.stopPropagation(); beginConnect(n.id,e); });

  const acts=document.createElement('div'); acts.className='node-actions';
  const plus=document.createElement('div'); plus.className='node-btn'; plus.title=t('btnChild'); plus.textContent='+';
  plus.addEventListener('mousedown',e=>{ e.stopPropagation(); addChild(n.id); });
  const minus=document.createElement('div'); minus.className='node-btn minus'; minus.title=t('btnDel'); minus.textContent='−';

const MIN_NODE_W = CONFIG.MIN_NODE_WIDTH;
const MAX_NODE_W = CONFIG.MAX_NODE_WIDTH;

function grow(ta){
  // Reset to minimal to measure natural single-line width
  ta.style.whiteSpace = 'pre';
  ta.style.width = 'auto';
  ta.style.height = 'auto';

  const naturalW = ta.scrollWidth;

  if(naturalW <= MAX_NODE_W){
    // fits on one line — keep single line width
    ta.style.width = Math.max(naturalW, MIN_NODE_W) + 'px';
    ta.style.whiteSpace = 'pre';
  } else {
    // wrap at max width
    ta.style.width = MAX_NODE_W + 'px';
    ta.style.whiteSpace = 'pre-wrap';
  }

  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function addChild(pid){
  const p=S.nodes[pid];
  // Count existing children to determine angle
  const childCount = S.edges.filter(e=>e.from===pid).length;
  // Counter-clockwise: start at right (0°), step by 60° CCW
  const RADIUS = CONFIG.NODE_RADIUS;
  const startAngle = 0; // degrees, right side
  const stepAngle = -18; // CCW
  const angleDeg = startAngle + childCount * stepAngle;
  const angleRad = angleDeg * Math.PI / 180;
  const cx = p.x + (p.w||110)/2;
  const cy = p.y + (p.h||38)/2;
  const nx = cx + Math.cos(angleRad) * RADIUS - 55;
  const ny = cy + Math.sin(angleRad) * RADIUS - 19;
  mkNode(nx, ny, null, p.color, pid, p.textColor, p.fontSize||12, p.textAlign||'center');
}

function setNodeAppearance(id,color,textColor){
  const n=S.nodes[id]; if(!n)return;
  if(color)     n.color=color;
  if(textColor) n.textColor=textColor;
  const el=document.getElementById(id);
  styleNode(el,n);
  el.querySelector('.node-dot').style.background=n.color;
  drawEdges();
}

function draggable(el,id){
  let drag=false,ox,oy;
  el.addEventListener('mousedown',e=>{
    if(e.button!==0||e.target.tagName==='TEXTAREA')return;
    drag=true;
    const n=S.nodes[id], r=canvas.getBoundingClientRect();
    ox=(e.clientX-r.left-S.tr.x)/S.tr.s-n.x;
    oy=(e.clientY-r.top -S.tr.y)/S.tr.s-n.y;
    e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!drag)return;
    const n=S.nodes[id], r=canvas.getBoundingClientRect();
    n.x=(e.clientX-r.left-S.tr.x)/S.tr.s-ox;
    n.y=(e.clientY-r.top -S.tr.y)/S.tr.s-oy;
    el.style.left=n.x+'px'; el.style.top=n.y+'px';
    drawEdges();
  });
  window.addEventListener('mouseup',()=>{ drag=false; });
}

// ─── EDGES — GREY TRIANGLES BEHIND NODES ──────────────
function mkEdge(from,to){
  if(S.edges.find(e=>(e.from===from&&e.to===to)||(e.from===to&&e.to===from))) return;
  S.edges.push({id:'e'+(++eid),from,to});
  drawEdges();
}

// Triangle base width (in world units) — fixed, not dependent on scale
const TRI_BASE_W = CONFIG.TRIANGLE_WIDTH;

function drawEdges(){
  edgesSvg.innerHTML='';
  const cr=canvas.getBoundingClientRect();

  for(const edge of S.edges){
    const a=S.nodes[edge.from], b=S.nodes[edge.to];
    if(!a||!b) continue;

    // Centers in world coords
    const acx=a.x+a.w/2, acy=a.y+a.h/2;
    const bcx=b.x+b.w/2, bcy=b.y+b.h/2;

    // Direction vector from parent(a) center to child(b) center
    const dx=bcx-acx, dy=bcy-acy;
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    const ux=dx/len, uy=dy/len;   // unit vector toward child
    const px=-uy, py=ux;           // perpendicular

    // Triangle base: two points near parent center (not on border)
    // Offset inward by half the base half-width so they sit close to center
    const baseOff = TRI_BASE_W / 2;   // half-width
    const b1x = acx + px*baseOff,  b1y = acy + py*baseOff;
    const b2x = acx - px*baseOff,  b2y = acy - py*baseOff;

    // Triangle tip: attachment point on child node border
    // (the tip should touch/slightly overlap the child node edge)
    const tipX = bcx - ux * (b.w/2 + 2);
    const tipY = bcy - uy * (b.h/2 + 2);
    // Clamp tip to actual elliptical border of child node
    const tipAttach = attachEllipse(b, acx, acy);

    // Convert to screen coords
    function sc(wx,wy){ const s=w2s(wx,wy); return { x:s.x-cr.left, y:s.y-cr.top }; }
    const sb1=sc(b1x,b1y), sb2=sc(b2x,b2y), sti=sc(tipAttach.x,tipAttach.y);

    const d=`M${sb1.x},${sb1.y} L${sti.x},${sti.y} L${sb2.x},${sb2.y} Z`;

    // Grey fill, no stroke — service element behind nodes
    const tri=document.createElementNS('http://www.w3.org/2000/svg','path');
    tri.setAttribute('d', d);
    tri.setAttribute('fill', 'rgba(140,140,160,0.28)');
    // No stroke
    tri.setAttribute('class','edge-tri');
    edgesSvg.appendChild(tri);
  }
}

// Elliptical border intersection from inside center toward (tx,ty)
function attachEllipse(n, tx, ty){
  const cx=n.x+n.w/2, cy=n.y+n.h/2;
  const dx=tx-cx, dy=ty-cy;
  const len=Math.sqrt(dx*dx+dy*dy)||1;
  const rx=n.w/2+1, ry=n.h/2+1;
  const t=1/Math.sqrt((dx/len)*(dx/len)/(rx*rx)+(dy/len)*(dy/len)/(ry*ry));
  return { x:cx+(dx/len)*t, y:cy+(dy/len)*t };
}

// ─── CONNECT GESTURE ──────────────────────────────────
function beginConnect(fromId,e){
  const cr=canvas.getBoundingClientRect();
  const n=S.nodes[fromId];
  const s=w2s(n.x+n.w+2, n.y+n.h/2);
  tmpLine.setAttribute('x1',s.x-cr.left); tmpLine.setAttribute('y1',s.y-cr.top);
  tmpLine.setAttribute('x2',e.clientX-cr.left); tmpLine.setAttribute('y2',e.clientY-cr.top);
  tmpLine.style.display='block';
  const mm=ev=>{ tmpLine.setAttribute('x2',ev.clientX-cr.left); tmpLine.setAttribute('y2',ev.clientY-cr.top); };
  const mu=ev=>{
    tmpLine.style.display='none';
    window.removeEventListener('mousemove',mm);
    window.removeEventListener('mouseup',mu);
    const tgt=ev.target.closest?.('.node');
    if(tgt&&tgt.id&&tgt.id!==fromId) mkEdge(fromId,tgt.id);
  };
  window.addEventListener('mousemove',mm);
  window.addEventListener('mouseup',mu);
}

// ─── DELETE ───────────────────────────────────────────
function delSel(){
  if(!S.sel) return;
  if(S.selType==='node'){
    const id=S.sel;
    document.getElementById(id)?.remove();
    delete S.nodes[id];
    S.edges=S.edges.filter(e=>e.from!==id&&e.to!==id);
    clearSel(); hidePal(); drawEdges();
  } else if(S.selType==='edge'){
    S.edges=S.edges.filter(e=>e.id!==S.sel);
    clearSel(); drawEdges();
  }
}

    sw.appendChild(x); swDiv.appendChild(sw);
  });
}

      toast(t('toastLoaded'));
    } catch(err){

    }
  };

  reader.readAsText(file);
});


function loadMap(data){

if(data.name){
  setProjectName(data.name);
  toast(t('toastLoaded')+': '+(data.name||''));
}
  world.innerHTML='';
  edgesSvg.innerHTML='';

  Object.keys(S.nodes).forEach(k=>delete S.nodes[k]);
  S.edges.length=0;
  S.sel=null;
  S.selType=null;

  if(data.palette) S.palette=data.palette;
  if(data.nid) nid=data.nid;

  if(data.bg){
    S.bg=data.bg;
    canvas.style.background=data.bg;
    document.getElementById('bg-color-input').value=data.bg;
  }

  data.nodes.forEach(n=>{
    S.nodes[n.id]={...n, w:110, h:38, fontSize:n.fontSize||12, textAlign:n.textAlign||'center', imageUrl:n.imageUrl||null};
    buildEl(S.nodes[n.id]);

    requestAnimationFrame(()=>{
      const el = document.getElementById(n.id);
      const ta = el.querySelector('.node-text');

      grow(ta); // 🔥 виправляє розмір

      S.nodes[n.id].w = el.offsetWidth;
      S.nodes[n.id].h = el.offsetHeight;

      drawEdges();
    });
  });

  S.edges = data.edges || [];

  drawEdges();
}

document.getElementById('btn-export').addEventListener('click',()=>{
  const nodes=Object.values(S.nodes); if(!nodes.length){toast(t('toastNoNodes'));return;}
  const pad=60;
  const minX=Math.min(...nodes.map(n=>n.x))-pad, minY=Math.min(...nodes.map(n=>n.y))-pad;
  const maxX=Math.max(...nodes.map(n=>n.x+n.w))+pad, maxY=Math.max(...nodes.map(n=>n.y+n.h))+pad;
  const W=maxX-minX, H=maxY-minY;

  // Unique gradient defs
  let defs='<defs>';
  nodes.forEach(n=>{
    const light=lighten(n.color,0.30);
    defs+=`<linearGradient id="g${n.id}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${n.color}"/><stop offset="100%" stop-color="${light}"/></linearGradient>`;
  });
  defs+='</defs>';

  let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">${defs}<rect width="${W}" height="${H}" fill="${S.bg}"/>`;

  // Triangles first (behind nodes)
  for(const edge of S.edges){
    const a=S.nodes[edge.from],b=S.nodes[edge.to]; if(!a||!b) continue;
    const acx=a.x+a.w/2-minX, acy=a.y+a.h/2-minY;
    const bcx=b.x+b.w/2-minX, bcy=b.y+b.h/2-minY;
    const dx=bcx-acx,dy=bcy-acy,len=Math.sqrt(dx*dx+dy*dy)||1;
    const ux=dx/len,uy=dy/len,px=-uy,py=ux;
    const hw=TRI_BASE_W/2;
    const b1x=acx+px*hw,b1y=acy+py*hw;
    const b2x=acx-px*hw,b2y=acy-py*hw;
    // tip near child border
    const col_b=b; const tipA=attachEllipseExport(col_b,a.x+a.w/2,a.y+a.h/2,minX,minY);
    svg+=`<path d="M${b1x},${b1y} L${tipA.x},${tipA.y} L${b2x},${b2y} Z" fill="rgba(140,140,160,0.28)"/>`;
  }
  // Nodes on top
  for(const n of nodes){
    const nx=n.x-minX,ny=n.y-minY,w=n.w,h=n.h;
    const tc=n.textColor||'#ffffff';
    const fs=n.fontSize||12;
    const ta=n.textAlign||'center';
    const textX = ta==='center' ? nx+w/2 : ta==='right' ? nx+w-12 : nx+12;
    const anchor = ta==='center' ? 'middle' : ta==='right' ? 'end' : 'start';
    svg+=`<rect x="${nx}" y="${ny}" width="${w}" height="${h}" rx="10" fill="url(#g${n.id})" stroke="${n.color}" stroke-width="1.5"/>`;
    n.text.split('\n').forEach((ln,i)=>{
      svg+=`<text x="${textX}" y="${ny+fs+8+i*(fs+4)}" font-family="sans-serif" font-size="${fs}" font-weight="600" fill="${tc}" text-anchor="${anchor}">${ln.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</text>`;
    });
  }
  svg+='</svg>';

  const blob=new Blob([svg],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas'); c.width=W*2; c.height=H*2;
    const ctx=c.getContext('2d'); ctx.scale(2,2); ctx.drawImage(img,0,0);
    URL.revokeObjectURL(url);
    c.toBlob(bl=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(bl); a.download=(S_projectName||'mindmap')+'.png'; a.click(); });
  };
  img.src=url; toast(t('toastPng'));
});

function attachEllipseExport(n, fromX, fromY, offX, offY){
  const cx=n.x+n.w/2-offX, cy=n.y+n.h/2-offY;
  const dx=(fromX-offX)-cx, dy=(fromY-offY)-cy;
  const len=Math.sqrt(dx*dx+dy*dy)||1;
  const rx=n.w/2+1, ry=n.h/2+1;
  const t=1/Math.sqrt((dx/len)*(dx/len)/(rx*rx)+(dy/len)*(dy/len)/(ry*ry));
  return { x:cx+(dx/len)*t, y:cy+(dy/len)*t };
}

function exportTXT(){
  const nodes = S.nodes;
  const edges = S.edges;

  const children = {};
  Object.keys(nodes).forEach(id => children[id] = []);
  edges.forEach(e=>{ children[e.from].push(e.to); });

  const hasParent = new Set(edges.map(e=>e.to));
  const roots = Object.keys(nodes).filter(id => !hasParent.has(id));

  function walk(id, prefix, visited=new Set()){
    if(visited.has(id)) return (prefix ? prefix+' ' : '') + nodes[id].text + ' (↺)\n';
    visited.add(id);
    let str = (prefix ? prefix+' ' : '') + nodes[id].text + '\n';
    children[id].forEach((ch, i)=>{
      const childPrefix = prefix ? prefix+'.'+(i+1) : String(i+1);
      str += walk(ch, childPrefix, new Set(visited));
    });
    return str;
  }

  let result = '';
  roots.forEach(r=>{
    // root = title (no number), its children start at 1
    result += nodes[r].text + '\n\n';
    children[r].forEach((ch, i)=>{
      result += walk(ch, String(i+1));
    });
    result += '\n';
  });

  const blob = new Blob([result], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (S_projectName || 'mindmap') + '.txt';
  a.click();
  toast(t('toastExportTxt'));
}

document.getElementById('btn-export-txt').addEventListener('click', exportTXT);


// ─── TOAST ────────────────────────────────────────────
function toast(msg){
  const t=document.createElement('div'); t.textContent=msg;
  Object.assign(t.style,{position:'fixed',bottom:'80px',left:'50%',transform:'translateX(-50%)',background:'#22222e',border:'1px solid #2e2e3e',color:'#e8e8f0',padding:'7px 16px',borderRadius:'10px',fontFamily:'Martian Mono,monospace',fontSize:'12px',zIndex:'9999',pointerEvents:'none',transition:'opacity .3s'});
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),300); },1800);
}

if(savedLang && I18N[savedLang]){

} else {
  currentLang = 'en';

  const r=canvas.getBoundingClientRect();
  S.tr={x:r.width/2-55, y:r.height/2-19, s:1};
  applyTr();
  const saved = localStorage.getItem('mm4');
  if(saved){
    loadMap(JSON.parse(saved));
  } else {
    mkNode(-55,-19,t('defaultRoot'),'#7c6af7');
  }

  // Автозбереження кожні 30 секунд
  setInterval(()=>{
    localStorage.setItem('mm4', getData(S_projectName));
    const ind = document.getElementById('autosave-ind');
    ind.style.opacity='1';
    setTimeout(()=>{ ind.style.opacity='0'; }, 1200);
  }, 30000);
});
